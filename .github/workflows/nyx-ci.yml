name: nyx-ci
run-name: "🛠️ Run №${{ github.run_number }}, ${{ github.event_name }} by ${{ github.actor }} (Attempt №${{ github.run_attempt }})"

on:
  push:
    paths:
      - "src/**"
      - ".github/**"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    paths:
      - "src/**"
      - ".github/**"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:

jobs:
  build:
    name: 🛠️ Toolchain Version — ${{ matrix.toolchain }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - stable
          - beta
          - nightly

    continue-on-error: ${{ matrix.toolchain == 'nightly' }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🦀 Setup
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy

      - name: ⚡ Cache
        uses: Swatinem/rust-cache@v2

      - name: 🎨 Formatting
        run: cargo fmt --check

      - name: 📋 Check
        if: matrix.toolchain != 'stable'
        run: cargo check --all-targets --all-features --locked

      - name: 🔍 Clippy
        if: matrix.toolchain == 'stable'
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: 🏗️ Build
        if: matrix.toolchain == 'stable'
        run: cargo build --release --locked
